# Development Environment Profile
# Server Configuration
server.port=9090

# # DataSource Configuration (Docker Compose Postgres)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.jdbc-url=${SPRING_DATASOURCE_HIKARI_JDBC_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Encryption key (must be 16 characters for AES-128)
encryption.secret.key=${ENCRYPTION_SECRET_KEY}

spring.flyway.validate-migration-naming=false
spring.flyway.ignore-missing-migrations=true
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true

# AWS S3 Configuration (Development)
aws.region=${AWS_REGION}
aws.access.key.id=${AWS_ACCESS_KEY_ID}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY}
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.presigned.url.expiration=${AWS_S3_PRESIGNED_URL_EXPIRATION}

# Redis Configuration (AWS ElastiCache - Valkey)
# Primary endpoint from AWS ElastiCache console
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.lettuce.ssl.enabled=${SPRING_DATA_REDIS_LETTUCE_SSL_ENABLED}

# Document Upload Configuration (Development)
document.upload.max-file-size=10MB
document.upload.allowed-content-types=application/pdf
document.upload.max-files-per-tenant=50

# Finch OAuth Settings (Sandbox)
finch.client-id=${FINCH_CLIENT_ID}
finch.client-secret=${FINCH_CLIENT_SECRET}
finch.secret-key=${FINCH_SECRET_KEY}
finch.redirect-uri=${FINCH_REDIRECT_URI}
finch.base-url=https://connect.tryfinch.com/authorize/
finch.token-url=https://api.tryfinch.com/auth/token
finch.session-url=https://api.tryfinch.com/connect/sessions
finch.reauth-url=https://api.tryfinch.com/connect/sessions/reauthenticate
finch.api-version=2020-09-17
finch.products=company%20directory%20individual%20employment%20payment%20benefits

# Spring Batch Configuration
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# Logging Configuration (Less verbose for dev)
logging.level.org.springframework.web=INFO
logging.level.com.glidingpath=INFO
logging.level.org.flywaydb.core=INFO

# Docker Compose (disabled for dev environment)
spring.docker.compose.enabled=false

# JPA Settings (more conservative for dev)
spring.jpa.show-sql=false

spring.config.import=classpath:config/bravo-email.properties

# Frontend URL Configuration (Development)
app.frontend.login-url=https://app-dev.glidingpath.co/login
app.frontend.base-url=https://app-dev.glidingpath.co

# Email Configuration - Brevo SMTP
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.from=${MAIL_FROM}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Service Configuration
email.mock.enabled=false
email.smtp.enabled=true
email.ses.enabled=false

# CORS Configuration
cors.allowed-origins='*'
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers,Cache-Control,Pragma
cors.allow-credentials=true
cors.max-age=3600

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

business-central.enabled=true
business-central.url=http://localhost:3001/business-central
business-central.kie-server-url=http://localhost:8091/kie-server/services/rest/server
business-central.maven-repository-url=http://localhost:3001/business-central/maven2/
business-central.username=admin
business-central.password=admin
business-central.container-id=EligibilityRules_1.0.0
business-central.group-id=com.glidingpath
business-central.artifact-id=eligibility-rules
business-central.version=1.0.0

# BTC File Processing Configuration (Development)
# Enable the BTC scheduler in dev so inbound files are pulled every 15 min
btc.scheduler.enabled=${BTC_SCHEDULER_ENABLED}
btc.scheduler.interval=900000
btc.auto-generate-files=false

# BTC File Directory Configuration (Development)
btc.input-dir=./data/btc/Download
btc.output-dir=./data/btc/Upload

# BTC SFTP Configuration (Development)
# Enable SFTP for BTC mock server testing
file.sftpHost=${BTC_SFTP_HOST}
file.sftpPort=${BTC_SFTP_PORT}
file.sftpEnabled=${FILE_SFTPENABLED}
file.sftpUser=btc
file.sftpPassword=btc123
# Remote directories on BTC mock server:
# - /outgoing: Where backend DOWNLOADS files FROM (BTC writes files to here)
# - /incoming: Where backend UPLOADS files TO (BTC reads files from here)
file.sftpRemoteInputDir=/outgoing
file.sftpRemoteOutputDir=/incoming
file.sftpPrivateKeyPath=
file.sftpKeyPassphrase=
file.sftpConnectionTimeout=30000
file.sftpSoTimeout=30000
file.sftpMaxRetries=3
file.sftpRetryDelay=5000
file.sftpStrictHostChecking=false
file.sftpKnownHostsPath=
file.sftpKeepLocalFiles=true
file.sftpArchiveProcessedFiles=false


# Stripe Configuration (Development)
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.success-url=${STRIPE_SUCCESS_URL}
stripe.cancel-url=${STRIPE_CANCEL_URL}

# ============================================
# SCHEDULER CONFIGURATION (For Testing)
# ============================================

# Enable SQS integration for scheduler
scheduler.sqs.enabled=true

# Pre-Payroll Scheduler (disabled - will trigger via Finch callback)
scheduler.pre-payroll.enabled=${SCHEDULER_PRE_PAYROLL_ENABLED}
scheduler.pre-payroll.cron=0 0 8 * * *

# Trade Aggregation Scheduler (runs daily at 3:00 PM to aggregate and send trades to BTC)
scheduler.trade-aggregation.enabled=${SCHEDULER_TRADE_AGGREGATION_ENABLED}
scheduler.trade-aggregation.cron=0 0 15 * * *
scheduler.trade-aggregation.default-tenant=default-tenant

# BTC Listener Scheduler (disabled for initial testing)
scheduler.btc-listener.enabled=${SCHEDULER_BTC_LISTENER_ENABLED}
scheduler.btc-listener.cron=0 * * * * *

# Fund Price Sync Scheduler (Daily 6 PM EST)
# Syncs fund prices from Yahoo Finance for accurate participant account valuations
scheduler.fund-price-sync.enabled=${SCHEDULER_FUND_PRICE_SYNC_ENABLED}
scheduler.fund-price-sync.cron=0 0 18 * * ?

# ============================================
# AWS SQS CONFIGURATION (Asia Pacific - Mumbai)
# ============================================
# Note: aws.region is already set above (line 44) to ap-south-1
# These credentials are specifically for SQS scheduler
aws.access-key-id=
aws.secret-access-key=

# SQS FIFO Queue URLs
aws.sqs.payroll-events-queue=${AWS_SQS_PAYROLL_EVENTS_QUEUE}
aws.sqs.btc-events-queue=${AWS_SQS_BTC_EVENTS_QUEUE}
aws.sqs.job-dlq=${AWS_SQS_JOB_DLQ}

# ============================================
# ENHANCED LOGGING (For Scheduler Testing)
# ============================================
logging.level.com.glidingpath.scheduler=DEBUG
logging.level.com.glidingpath.finch=DEBUG
logging.level.software.amazon.awssdk=INFO

# Cookie Configuration (Development)
# Domain without leading dot (RFC 6265 compliant)
app.cookie.secure=${APP_COOKIE_SECURE}
app.cookie.same-site=${APP_COOKIE_SAME_SITE}
app.cookie.domain=${APP_COOKIE_DOMAIN}
