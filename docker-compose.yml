services:
  # BTC Mock Server - SFTP server for custodian integration testing
  btc-mock-server:
    build:
      context: .
      dockerfile: modules/x-btc-mock-server/Dockerfile
    container_name: btc-mock-server
    ports:
      - "8099:8099"  # HTTP API
      - "2222:2222"  # SFTP
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - BTC_MOCK_SFTP_HOST=0.0.0.0
    volumes:
      - btc-sftp-data:/app/sftp-root
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f http://localhost:8099/actuator/health || exit 1"]
    #   interval: 30s
    #   timeout: 5s
    #   start_period: 45s
    #   retries: 3
    # restart: always
    networks:
      - glidingpath-network

  app:
    image: ${BACKEND_IMAGE:-glidingpath-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glidingpath-backend
    # Load ALL env vars from external file (won't be wiped by deployment)
    # The external file should use Spring Boot's native property names
    env_file:
      - /home/ubuntu/gp-backend.env
    ports:
      - "9090:9090"
    restart: always
    depends_on:
      - btc-mock-server
        # condition: service_healthy
    # Allow container to access host machine services (Redis, PostgreSQL on host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Override BTC SFTP connection to use container name instead of localhost
      - BTC_SFTP_HOST=btc-mock-server
      - BTC_SFTP_PORT=2222
      # Cookie config for HTTP/IP-based dev deployment (browser rejects
      # Secure cookies on HTTP and Domain= attribute on non-domain hosts).
      # These wins over /home/ubuntu/gp-backend.env via compose precedence.
      - APP_COOKIE_SECURE=false
      - APP_COOKIE_SAME_SITE=Lax
      - APP_COOKIE_DOMAIN=
    # Extended health check for slow Spring Boot startup
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/v1/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5
    networks:
      - glidingpath-network
 
