name: Build & Deploy Backend (ECR + EC2)

# ===========================
# AUTO DEPLOY ON PUSH TO DEV
# ===========================
on:
  push:
    branches:
      - dev
  workflow_dispatch:

# ===========================
# ENV
# ===========================
env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "057493959479"
  ECR_REPO: glidingpath-dev-backend
  EC2_USER: ubuntu
  DEPLOY_DIR: /home/ubuntu/workspace/gp-backend

jobs:
  build:
    # Only allow deployment from dev branch
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # SSH Prep
      # ---------------------------
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # ---------------------------
      # Sync code to EC2
      # ---------------------------
      - name: Sync code to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'build' \
            --exclude '.gradle' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ $EC2_USER@$EC2_HOST:$DEPLOY_DIR/

      # ---------------------------
      # Build, Push on EC2 (Native ARM64)
      # ---------------------------
      - name: Build & Push on EC2
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          ssh -i ~/.ssh/deploy_key \
            $EC2_USER@$EC2_HOST \
            "IMAGE_TAG=$IMAGE_TAG bash -s" << 'EOF'
          set -e

          ACCOUNT_ID="057493959479"
          REGION="ap-south-1"
          REPO="glidingpath-dev-backend"
          DEPLOY_DIR="/home/ubuntu/workspace/gp-backend"

          BACKEND_IMAGE="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${REPO}:${IMAGE_TAG}"
          export BACKEND_IMAGE

          echo "=== Building image on EC2 (native ARM64) ==="
          cd ${DEPLOY_DIR}

          # Login to ECR
          aws ecr get-login-password --region ${REGION} | \
            docker login --username AWS --password-stdin \
            ${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com

          # Build image (native ARM64 - fast!)
          echo "Building: ${BACKEND_IMAGE}"
          docker build -t "${BACKEND_IMAGE}" .

          # Push to ECR
          echo "Pushing to ECR..."
          docker push "${BACKEND_IMAGE}"

          echo "=== Image pushed successfully ==="
          EOF

      # ---------------------------
      # Cleanup
      # ---------------------------
      - name: Cleanup SSH key
        run: rm -f ~/.ssh/deploy_key

  deploy:
    needs: build
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}

    steps:
      # ---------------------------
      # SSH Prep
      # ---------------------------
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      # ---------------------------
      # Deploy on EC2
      # ---------------------------
      - name: Deploy on EC2
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          ssh -i ~/.ssh/deploy_key \
            $EC2_USER@$EC2_HOST \
            "IMAGE_TAG=$IMAGE_TAG bash -s" << 'EOF'
          set -e

          ACCOUNT_ID="057493959479"
          REGION="ap-south-1"
          REPO="glidingpath-dev-backend"
          DEPLOY_DIR="/home/ubuntu/workspace/gp-backend"

          BACKEND_IMAGE="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${REPO}:${IMAGE_TAG}"
          export BACKEND_IMAGE

          echo "=== Login to ECR ==="
          aws ecr get-login-password --region ${REGION} | \
            docker login --username AWS --password-stdin \
            ${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com

          echo "=== Pull latest image ==="
          docker pull ${BACKEND_IMAGE}

          echo "=== Deploy with docker-compose ==="
          cd ${DEPLOY_DIR}
          docker compose up -d --remove-orphans

          echo "=== Container Status ==="
          docker compose ps

          echo "=== Cleanup old images ==="
          docker image prune -f
          EOF

      # ---------------------------
      # Cleanup
      # ---------------------------
      - name: Cleanup SSH key
        run: rm -f ~/.ssh/deploy_key
