name: Build Only (Manual Test - ECR Push)

on:
  workflow_dispatch:   

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "057493959479"
  ECR_REPO: glidingpath-dev-backend
  EC2_USER: ubuntu
  DEPLOY_DIR: /home/ubuntu/workspace/gp-backend

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Sync code to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'build' \
            --exclude '.gradle' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ $EC2_USER@$EC2_HOST:$DEPLOY_DIR/

      - name: Build & Push on EC2
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          ssh -i ~/.ssh/deploy_key \
            $EC2_USER@$EC2_HOST \
            "IMAGE_TAG=$IMAGE_TAG bash -s" << 'EOF'
          set -e

          ACCOUNT_ID="057493959479"
          REGION="ap-south-1"
          REPO="glidingpath-dev-backend"
          DEPLOY_DIR="/home/ubuntu/workspace/gp-backend"

          IMAGE="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${REPO}:${IMAGE_TAG}"

          echo "Using IMAGE_TAG=$IMAGE_TAG"

          cd ${DEPLOY_DIR}

          aws ecr get-login-password --region ${REGION} | \
            docker login --username AWS --password-stdin \
            ${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com

          docker build -t "$IMAGE" .
          docker push "$IMAGE"

          echo "=== Image pushed successfully ==="
          EOF

      - name: Cleanup SSH key
        run: rm -f ~/.ssh/deploy_key
