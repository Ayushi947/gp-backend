name: PR Validation - Dev

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

jobs:
  pr-validation:
    name: Tests & Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify Gradle wrapper
        run: ./gradlew --version

      - name: Build application (skip tests for now)
        run: ./gradlew clean build -x test
